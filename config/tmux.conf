# ── claude-danger-lab tmux configuration ──────────────────────────────────────

# Use Ctrl-a as prefix (friendlier on mobile keyboards than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support (useful from mobile SSH clients)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 50000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Use 256-colour terminal
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Reduce escape-time (important for vim / claude TUI inside tmux)
set -sg escape-time 10

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Status bar – minimal and informative
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour250"

set -g status-left-length 30
set -g status-left "#[fg=colour46,bold][danger-lab] #[fg=colour250]"

set -g status-right-length 60
set -g status-right "#[fg=colour250]%Y-%m-%d %H:%M #[fg=colour240]| #[fg=colour46]#H"

setw -g window-status-current-style "fg=colour46,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour46"

# Key bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file /root/.tmux.conf \; display "tmux.conf reloaded"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Session management shortcuts
bind d detach-client
bind D choose-session

# Ensure new windows open in workspace
bind c new-window -c "/workspace"
