# claude-danger-lab — project list
#
# One project per line:
#   <session-name>  <git-url>
#
# Each project gets its own tmux window and claude remote-control session.
# The session name appears in the Claude app and in tmux (Ctrl-a w to switch).
#
# If this file is empty (or has no active lines), Claude starts in /workspace.
#
# Examples:
#   api       https://github.com/acme/api
#   frontend  https://github.com/acme/frontend
#   infra     git@github.com:acme/infra.git
