services:
  claude:
    # Prebuilt image from GitHub Container Registry.
    # docker compose pull   – update to the latest published image
    # docker compose build  – build locally from source instead
    image: ghcr.io/cheeryprogrammer/claude-danger-lab:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pin Go version here; override with: docker compose build --build-arg GO_VERSION=x.y.z
        GO_VERSION: "latest"
    container_name: claude-danger-lab
    restart: unless-stopped

    ports:
      # SSH access: ssh -p 2222 root@<host>
      # Change the host port (2222) if it conflicts with another service.
      - "${SSH_PORT:-2222}:22"

    environment:
      # ── Required: paste your SSH public key so you can connect ───────────────
      - SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY:-}

      # ── Claude authentication (choose one method) ─────────────────────────────
      # Method A (recommended): set ANTHROPIC_API_KEY in .env
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # ── SSH port (used in the startup banner)
      - SSH_PORT=${SSH_PORT:-2222}

      # ── Terminal ───────────────────────────────────────────────────────────────
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - LANG=en_US.UTF-8

    volumes:
      # Project directory: mount your code here, or use a named volume
      - ${WORKSPACE_PATH:-./workspace}:/workspace

      # Claude Code state and memory (sessions, history, settings)
      - claude-memory:/root/.claude

      # SSH host keys persist so the fingerprint never changes after first run
      - ssh-host-keys:/etc/ssh/host-keys

      # Project list — edit projects.conf to define repos to work on
      - ./projects.conf:/etc/danger-lab/projects.conf:ro

    # Resource limits – loosen or remove for resource-heavy tasks
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-4g}

    # Useful for interactive tools; does NOT expose a tty by default on
    # `docker compose up -d` but keeps stdin open for docker attach fallback.
    stdin_open: true
    tty: true

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  claude-memory:
    driver: local
  ssh-host-keys:
    driver: local
